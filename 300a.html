<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>300A Site – Weekly Figures</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
</head>
<body>
  <div class="app-wrapper">
  <!-- Sidebar -->
  <div id="sidebar-placeholder"></div>

    <!-- Main content -->
    <main class="main-content">
      <div class="container">
        <h1>📈 300A Site – Weekly Figures</h1>
        <div class="header-row">
          <p class="instruction-text">Select a week to view the interactive figure.</p>
          <a class="back-link" href="index.html">← Back to home</a>
        </div>

        <div class="selector">
          <label for="weekSelect">Choose a week:</label>
          <select id="weekSelect"></select>
        </div>

        <div class="figure-container">
          <iframe id="figureIframe" title="Weekly figure" srcdoc="<p style='text-align:center; padding:2rem;'>Select a week to view figure</p>"></iframe>
        </div>
        <footer>
          <p>© <span id="year"></span> WSU LAR Lab423 – 300A weekly figures</p>
        </footer>
      </div>
    </main>
  </div>

<script src="300a_figures_list.js"></script>
<script>
  fetch('sidebar.html?v=' + Date.now())
    .then(response => response.text())
    .then(html => {
      document.getElementById('sidebar-placeholder').innerHTML = html;
      // Optional: highlight the active link based on current page
      highlightActiveLink();
    })
    .catch(err => console.error('Sidebar load error:', err));

  function highlightActiveLink() {
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.site-link').forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
      }
    });
  }

  const selectEl = document.getElementById('weekSelect');
  const iframeEl = document.getElementById('figureIframe');

  // This function fetches and injects the figure's HTML
  function loadFigure(filePath) {
    fetch(filePath)
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        return response.text();
      })
      .then(html => {
        iframeEl.srcdoc = html;
      })
      .catch(err => {
        console.error('Failed to load figure:', err);
        iframeEl.srcdoc = `<p style='text-align:center; color:red; padding:2rem;'>Unable to load figure: ${err.message}</p>`;
      });
  }

  // Populate the dropdown
  weeklyFigures.forEach((item) => {
    const option = document.createElement('option');
    option.value = item.file;
    option.textContent = item.label;
    selectEl.appendChild(option);
  });

  // Load the first figure by default
  if (weeklyFigures.length > 0) {
    loadFigure(weeklyFigures[0].file);
  }

  // Load a new figure when the dropdown selection changes
  selectEl.addEventListener('change', (e) => {
    loadFigure(e.target.value);
  });

  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
