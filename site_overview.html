<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Sites – Data Availability Overview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>

</head>
<body>
<div class="app-wrapper">
  <!-- Sidebar -->
  <div id="sidebar-placeholder"></div>

  <!-- Main content -->
  <main class="main-content">
    <div class="container">
      <h1>Data availability overview</h1>
      <div class="subhead">Gantt charts showing when each site had valid measurements</div>

      <div id="ganttGrid" class="gantt-grid">
        <div class="loading" style="grid-column:1/-1; text-align:center; padding:2rem;">Loading Gantt charts…</div>
      </div>

      <p><a class="back-link" href="index.html">← Back to home</a></p>
      <footer>
        <p>© <span id="year"></span> WSU LAR Lab423 – Data overview</p>
      </footer>
    </div>
  </main>
</div>

<script>
  fetch('sidebar.html?v=' + Date.now())
      .then(response => response.text())
      .then(html => {
        document.getElementById('sidebar-placeholder').innerHTML = html;
        // Optional: highlight the active link based on current page
        highlightActiveLink();
      })
      .catch(err => console.error('Sidebar load error:', err));

  function highlightActiveLink() {
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.site-link').forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
      }
    });
  }

  // List all sites with their Gantt file paths.
  // Adjust paths to match your actual generated files.
  const sites = [
    { name: "A3", path: "figures/a3/a3_gantt.html" },
    { name: "A5", path: "figures/a5/a5_gantt.html" },
    { name: "300A", path: "figures/300a/300a_gantt.html" },
    { name: "BNF", path: "figures/bnf/bnf_gantt.html" },
    { name: "RBR", path: "figures/rbr/rbr_gantt.html" },
    { name: "INL", path: "figures/inl/inl_gantt.html" }
  ];

  const grid = document.getElementById('ganttGrid');
  grid.innerHTML = ''; // clear loading message

  sites.forEach(site => {
    const card = document.createElement('div');
    card.className = 'gantt-card';

    const header = document.createElement('div');
    header.className = 'card-header';
    header.textContent = `${site.name} site – measurement periods`;
    card.appendChild(header);

    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'card-body';
    bodyDiv.innerHTML = '<div style="padding:1rem; text-align:center;">Loading Gantt…</div>';
    card.appendChild(bodyDiv);

    grid.appendChild(card);

    fetch(site.path)
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      })
      .then(html => {
        const iframe = document.createElement('iframe');
        iframe.style.width = '100%';
        iframe.style.height = '280px';
        iframe.srcdoc = html;
        bodyDiv.innerHTML = '';
        bodyDiv.appendChild(iframe);
      })
      .catch(err => {
        console.error(`Failed to load Gantt for ${site.name}:`, err);
        bodyDiv.innerHTML = `<div style="padding:1rem; text-align:center; color:red;">⚠️ Could not load Gantt chart for ${site.name}.<br>${err.message}</div>`;
      });
  });

  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
